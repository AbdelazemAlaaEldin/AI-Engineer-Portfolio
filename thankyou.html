<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الإرسال بنجاح | شكراً لك</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Cairo:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e342e;
            --secondary: #a67b5b;
            --bg: #fdfaf5;
        }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .thank-you-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--secondary);
            max-width: 500px;
        }

        .icon {
            font-size: 60px;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .back-btn {
            text-decoration: none;
            background: var(--secondary);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <div class="thank-you-card">
        <div class="icon">
            <i class="fas fa-paper-plane"></i>
        </div>
        <h1>شكراً لتواصلك!</h1>
        <p>لقد تم استلام رسالتك بنجاح، وسأقوم بالرد عليك في أقرب وقت ممكن.</p>
        <a href="index.html" class="back-btn">العودة للموقع</a>
    </div>

</body>

</html>
